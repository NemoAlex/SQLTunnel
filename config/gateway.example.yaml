defaults: # Optional. Global query limits used when db server/client grant does not define stricter values.
  maxRows: 1000 # Optional. Default: 1000.
  queryTimeoutMs: 10000 # Optional. Database query timeout. Default: 10000.
  connectTimeoutMs: 10000 # Optional. SSH tunnel and database connection timeout. Default: 10000.
  schemaCacheTtlMs: 300000 # Optional. Schema metadata cache TTL. 0 disables caching. Default: 300000 (5 minutes).

sshServers: # Optional. Reusable SSH connections referenced by dbServers[].sshServerId.
  - id: bastion-prod
    host: bastion-prod # Required. Real hostname or Host alias from sshConfigPath / ~/.ssh/config.
    sshConfigPath: ssh/config # Optional. Relative to gateway.yaml directory; default: ~/.ssh/config.
    privateKeyPath: ssh/id_rsa # Optional. Relative to gateway.yaml directory; fallback: IdentityFile or ~/.ssh/id_*.
    passphrase: optional-key-passphrase # Optional. Needed for encrypted private keys when ssh-agent cannot unlock them.
    idleTimeoutMs: 60000 # Optional. Default: 60000.

dbServers: # Required. Database servers that clients can access.
  - id: prod-postgres
    description: E-commerce production database containing customer accounts, products, orders, and payments. # Optional. Shown to MCP clients.
    type: postgres # Required. mysql or postgres.
    maxRows: 1000 # Optional. Falls back to defaults.maxRows.
    queryTimeoutMs: 10000 # Optional. Database query timeout; falls back to defaults.queryTimeoutMs.
    connectTimeoutMs: 10000 # Optional. SSH tunnel and database connection timeout; falls back to defaults.connectTimeoutMs.
    database:
      host: 127.0.0.1 # Required.
      port: 5432 # Required.
      user: postgres # Required.
      password: postgres-password # Required.
      database: app # Required.

  - id: reporting-mysql
    description: Analytics database containing daily sales, product performance, and conversion funnel metrics.
    type: mysql
    sshServerId: bastion-prod # Optional. Omit for direct database connections.
    database:
      host: 127.0.0.1
      port: 3306
      user: app
      password: mysql-password
      database: app

clients: # Required. API clients and their per-db-server permissions.
  - id: analytics-app
    apiKey: dev-read-key # Required. Sent by callers as an Authorization Bearer token.
    dbServers:
      - serverId: prod-postgres
        permission: read # Optional. read or write. Defaults to read.
        maxRows: 500 # Optional. Further restricts this client for this db server.
        queryTimeoutMs: 5000 # Optional. Further restricts this client for this db server.
      - serverId: reporting-mysql

  - id: admin-tool
    apiKey: dev-write-key
    dbServers:
      - serverId: prod-postgres
        permission: write
        maxRows: 100
        queryTimeoutMs: 3000
      - serverId: reporting-mysql
