name: Desktop Release

# Optional repository secrets for trusted packages:
# - macOS: MAC_CSC_LINK, MAC_CSC_KEY_PASSWORD, APPLE_ID,
#   APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
# - Windows: WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD
# Builds remain usable for local testing when these secrets are absent, but
# downloaded artifacts will show the operating system's unsigned-app warning.

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-desktop:
    name: Verify release sources
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const version = require('./package.json').version; if (process.env.RELEASE_TAG !== 'v' + version) throw new Error('Tag ' + process.env.RELEASE_TAG + ' does not match package version ' + version)"

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build desktop sources
        run: npm run build:desktop

  package-desktop:
    name: Package ${{ matrix.name }}
    needs: verify-desktop
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS arm64
            os: macos-14
            platform: mac
            arch: arm64
            artifact: sqltunnel-macos-arm64
          - name: macOS x64
            os: macos-14
            platform: mac
            arch: x64
            artifact: sqltunnel-macos-x64
          - name: Windows x64
            os: windows-2022
            platform: win
            arch: x64
            artifact: sqltunnel-windows-x64
    runs-on: ${{ matrix.os }}
    env:
      ELECTRON_CACHE: ${{ runner.temp }}/electron
      ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Cache Electron build tools
        uses: actions/cache@v6
        with:
          path: |
            ${{ env.ELECTRON_CACHE }}
            ${{ env.ELECTRON_BUILDER_CACHE }}
          key: electron-${{ runner.os }}-${{ matrix.arch }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            electron-${{ runner.os }}-${{ matrix.arch }}-

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build desktop sources
        run: npm run build:desktop

      - name: Package macOS ${{ matrix.arch }}
        if: matrix.platform == 'mac'
        env:
          SQLTUNNEL_MAC_CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          SQLTUNNEL_MAC_CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          SQLTUNNEL_APPLE_ID: ${{ secrets.APPLE_ID }}
          SQLTUNNEL_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          SQLTUNNEL_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          if [[ -n "$SQLTUNNEL_MAC_CSC_LINK" ]]; then
            export CSC_LINK="$SQLTUNNEL_MAC_CSC_LINK"
            export CSC_KEY_PASSWORD="$SQLTUNNEL_MAC_CSC_KEY_PASSWORD"
            export APPLE_ID="$SQLTUNNEL_APPLE_ID"
            export APPLE_APP_SPECIFIC_PASSWORD="$SQLTUNNEL_APPLE_APP_SPECIFIC_PASSWORD"
            export APPLE_TEAM_ID="$SQLTUNNEL_APPLE_TEAM_ID"
          else
            export CSC_IDENTITY_AUTO_DISCOVERY=false
          fi
          npx electron-builder --mac --${{ matrix.arch }} --publish never

      - name: Package Windows ${{ matrix.arch }}
        if: matrix.platform == 'win'
        env:
          SQLTUNNEL_WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          SQLTUNNEL_WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
        run: |
          if ($env:SQLTUNNEL_WIN_CSC_LINK) {
            $env:CSC_LINK = $env:SQLTUNNEL_WIN_CSC_LINK
            $env:CSC_KEY_PASSWORD = $env:SQLTUNNEL_WIN_CSC_KEY_PASSWORD
          } else {
            $env:CSC_IDENTITY_AUTO_DISCOVERY = "false"
          }
          npx electron-builder --win --${{ matrix.arch }} --publish never

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*-Setup.exe

  publish-release:
    name: Publish GitHub Release
    needs: package-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Skip release for non-tag builds
        if: startsWith(github.ref, 'refs/tags/') == false
        run: echo "Desktop artifacts were validated; a GitHub Release is created only for version tags."

      - name: Download desktop artifacts
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag --generate-notes --title "SQLTunnel ${GITHUB_REF_NAME#v}" --repo "$GITHUB_REPOSITORY"
          fi
