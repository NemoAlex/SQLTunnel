name: Desktop

# Optional repository secrets for trusted packages:
# - macOS: MAC_CSC_LINK, MAC_CSC_KEY_PASSWORD, APPLE_ID,
#   APPLE_APP_SPECIFIC_PASSWORD, APPLE_TEAM_ID
# - Windows: WIN_CSC_LINK, WIN_CSC_KEY_PASSWORD
# Builds remain usable for local testing when these secrets are absent, but
# downloaded artifacts will show the operating system's unsigned-app warning.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*.*.*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref_type != 'tag' }}

jobs:
  build-desktop:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-14
            artifact: sqltunnel-macos
          - name: Windows
            os: windows-2022
            artifact: sqltunnel-windows
    runs-on: ${{ matrix.os }}

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const version = require('./package.json').version; if (process.env.RELEASE_TAG !== 'v' + version) throw new Error('Tag ' + process.env.RELEASE_TAG + ' does not match package version ' + version)"

      - name: Type-check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build desktop sources
        run: npm run build:desktop

      - name: Package macOS x64 and arm64
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --x64 --arm64 --publish never
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Package Windows x64 and arm64
        if: runner.os == 'Windows'
        run: npx electron-builder --win --x64 --arm64 --publish never
        env:
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          if-no-files-found: error
          retention-days: 14
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.blockmap

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-desktop
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download desktop artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" artifacts/* --clobber --repo "$GITHUB_REPOSITORY"
          else
            gh release create "$GITHUB_REF_NAME" artifacts/* --verify-tag --generate-notes --title "SQLTunnel ${GITHUB_REF_NAME#v}" --repo "$GITHUB_REPOSITORY"
          fi
